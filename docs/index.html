<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<title>Docs — Dark Fraction</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #333;
    min-height: 100vh;
    display: flex;
  }

  /* ── Two-column layout ── */
  .docs-layout {
    display: flex;
    width: 100%;
    min-height: 100vh;
    padding-top: 54px; /* clear hamburger */
  }

  /* ── Left sidebar (doc list) ── */
  .docs-sidebar {
    width: 450px;
    min-width: 250px;
    flex-shrink: 0;
    padding: 24px 16px;
    border-right: 1px solid #e0e0e0;
    background: #fafafa;
    position: sticky;
    top: 54px;
    height: calc(100vh - 54px);
    overflow-y: auto;
  }

  .docs-sidebar__title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin-bottom: 16px;
  }

  .docs-sidebar__list {
    list-style: none;
  }

  .docs-sidebar__item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    margin-bottom: 2px;
    border-radius: 6px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }

  .docs-sidebar__item:hover {
    background: #eee;
  }

  .docs-sidebar__item.active {
    background: rgba(59, 130, 246, 0.1);
    color: #2563eb;
    font-weight: 600;
  }

  .docs-sidebar__chevron {
    display: inline-block;
    margin-right: 6px;
    font-size: 10px;
    transition: transform 0.2s;
  }
  .docs-sidebar__chevron.expanded {
    transform: rotate(90deg);
  }

  .docs-sidebar__section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin: 20px 0 8px;
    padding: 0 12px;
    list-style: none;
  }

  /* ── Thin scrollbar ── */
  .docs-sidebar {
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  .docs-sidebar::-webkit-scrollbar {
    width: 5px;
  }
  .docs-sidebar::-webkit-scrollbar-track {
    background: transparent;
  }
  .docs-sidebar::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
  }
  .docs-sidebar::-webkit-scrollbar-thumb:hover {
    background: #aaa;
  }

  /* ── Resize handle ── */
  .docs-resize-handle {
    width: 4px;
    flex-shrink: 0;
    cursor: col-resize;
    background: transparent;
    position: sticky;
    top: 54px;
    height: calc(100vh - 54px);
    z-index: 5;
    transition: background 0.15s;
  }
  .docs-resize-handle:hover,
  .docs-resize-handle.active {
    background: rgba(59, 130, 246, 0.4);
  }

  /* ── Headings submenu ── */
  .docs-sidebar__headings {
    list-style: none;
    padding: 2px 0 6px 0;
    margin: 0;
  }
  .docs-sidebar__headings.collapsed {
    display: none;
  }
  .docs-sidebar__heading-item {
    display: block;
    font-size: 12px;
    color: #777;
    cursor: pointer;
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .docs-sidebar__heading-item:hover {
    color: #2563eb;
  }
  .docs-sidebar__heading-item[data-level="1"] { padding: 3px 12px 3px 24px; }
  .docs-sidebar__heading-item[data-level="2"] { padding: 3px 12px 3px 36px; }
  .docs-sidebar__heading-item[data-level="3"] { padding: 3px 12px 3px 48px; }
  .docs-sidebar__heading-item[data-level="4"] { padding: 3px 12px 3px 60px; }
  .docs-sidebar__heading-item[data-level="5"] { padding: 3px 12px 3px 72px; }
  .docs-sidebar__heading-item[data-level="6"] { padding: 3px 12px 3px 84px; }

  /* ── Right content area ── */
  .docs-content {
    flex: 1;
    min-width: 0;
    padding: 32px 48px 80px;
  }

  .docs-content__card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 40px 48px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  /* ── Markdown rendered content ── */
  .docs-content__card h1 {
    font-size: 26px;
    font-weight: 700;
    color: #111;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
  }

  .docs-content__card h2 {
    font-size: 20px;
    font-weight: 700;
    color: #222;
    margin: 2em 0 0.6em;
    padding-bottom: 6px;
    border-bottom: 1px solid #f0f0f0;
  }

  .docs-content__card h3 {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin: 1.6em 0 0.4em;
  }

  .docs-content__card h4 {
    font-size: 13px;
    font-weight: 700;
    color: #555;
    margin: 1.4em 0 0.3em;
  }

  .docs-content__card p {
    font-size: 14px;
    line-height: 1.75;
    margin: 0.6em 0;
  }

  .docs-content__card strong { color: #111; }

  .docs-content__card a {
    color: #2563eb;
    text-decoration: none;
  }
  .docs-content__card a:hover {
    text-decoration: underline;
  }

  .docs-content__card code {
    background: #eff6ff;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: #2563eb;
  }

  .docs-content__card pre {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.6;
    margin: 1em 0;
  }

  .docs-content__card pre code {
    background: none;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }

  .docs-content__card ul, .docs-content__card ol {
    padding-left: 1.5em;
    margin: 0.6em 0;
  }

  .docs-content__card li {
    font-size: 14px;
    line-height: 1.75;
    margin: 0.3em 0;
  }

  .docs-content__card blockquote {
    border-left: 3px solid #2563eb;
    padding: 8px 16px;
    margin: 1em 0;
    background: #f0f7ff;
    color: #555;
    font-style: italic;
  }

  .docs-content__card table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    font-size: 13px;
  }

  .docs-content__card th {
    background: #f8f8f8;
    font-weight: 700;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
  }

  .docs-content__card td {
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
    vertical-align: top;
  }

  .docs-content__card hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 2em 0;
  }

  .docs-content__card img {
    max-width: 100%;
    border-radius: 8px;
    margin: 1em 0;
  }

  /* ── Loading / empty ── */
  .docs-loading {
    color: #999;
    font-size: 13px;
    padding: 20px 0;
  }

  /* fade in */
  .docs-content__card {
    opacity: 0;
    transition: opacity 0.2s;
  }
  .docs-content__card.loaded { opacity: 1; }

  /* ── Export toolbar ── */
  .docs-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .docs-export-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    background: #fff;
    color: #555;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .docs-export-btn:hover {
    border-color: #2563eb;
    color: #2563eb;
    background: #f0f7ff;
  }
</style>
</head>
<body>
<script src="../js/nav/sidebar.js" data-active="docs"></script>
<a href="/" style="position:fixed;top:12px;left:50px;z-index:1100;height:30px;text-decoration:none;color:#aaa;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;transition:color .15s" onmouseover="this.style.color='#777'" onmouseout="this.style.color='#aaa'">&#8249; BACK</a>

<div class="docs-layout">
  <aside class="docs-sidebar" id="docs-sidebar">
    <div class="docs-sidebar__title">Documentation</div>
    <ul class="docs-sidebar__list" id="docs-list"></ul>
  </aside>
  <div class="docs-resize-handle" id="docs-resize-handle"></div>

  <main class="docs-content">
    <div class="docs-toolbar">
      <button class="docs-export-btn" data-format="pdf">PDF</button>
      <button class="docs-export-btn" data-format="txt">TXT</button>
      <button class="docs-export-btn" data-format="md">MD</button>
      <button class="docs-export-btn" data-format="docx">DOCX</button>
    </div>
    <div class="docs-content__card" id="docs-card">
      <p class="docs-loading">Loading...</p>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
<script>
/* ─────────────────────────────────────────────────────────
   DocsLeftColumnManager
   ─────────────────────────────────────────────────────────
   Manages the docs sidebar sections and file entries.

   Usage:
     DocsLeftColumnManager.setSection("General", [
       "getting_started.md",
       "event_bus.md",
       "sidebar.md"
     ]);
     DocsLeftColumnManager.setSection("Canonical", [
       "canonical/tasks.md",
       "canonical/keys.md"
     ]);
     DocsLeftColumnManager.render();          // builds the sidebar & loads first doc
   ───────────────────────────────────────────────────────── */
var DocsLeftColumnManager = (function () {
  var listEl = document.getElementById('docs-list');
  var cardEl = document.getElementById('docs-card');
  var activeFile = null;
  var sections = [];       // ordered list: { name, files[] }

  /* ── Derive a display title from a file path ── */
  function titleFromPath(filePath) {
    var name = filePath.split('/').pop().replace(/\.md$/i, '');
    return name
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  /* ── Build heading submenu under active sidebar item ── */
  function buildHeadingsSubmenu() {
    var existing = listEl.querySelector('.docs-sidebar__headings');
    if (existing) existing.remove();

    var activeItem = listEl.querySelector('.docs-sidebar__item.active');
    if (!activeItem) return;

    var headings = cardEl.querySelectorAll('h1, h2, h3, h4, h5, h6');
    if (headings.length === 0) return;

    headings.forEach(function (h, i) {
      if (!h.id) h.id = 'doc-heading-' + i;
    });

    var ul = document.createElement('ul');
    ul.className = 'docs-sidebar__headings';

    headings.forEach(function (h) {
      var li = document.createElement('li');
      li.className = 'docs-sidebar__heading-item';
      li.dataset.level = h.tagName[1];
      li.textContent = h.textContent;
      li.addEventListener('click', function (e) {
        e.stopPropagation();
        var target = document.getElementById(h.id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      ul.appendChild(li);
    });

    listEl.insertBefore(ul, activeItem.nextSibling);
  }

  /* ── Load & display a markdown file ── */
  function loadDoc(file) {
    if (activeFile === file) {
      var submenu = listEl.querySelector('.docs-sidebar__headings');
      if (submenu) {
        submenu.classList.toggle('collapsed');
        var chevron = listEl.querySelector('.docs-sidebar__item.active .docs-sidebar__chevron');
        if (chevron) chevron.classList.toggle('expanded', !submenu.classList.contains('collapsed'));
      }
      return;
    }
    activeFile = file;
    window.location.hash = file;

    var existing = listEl.querySelector('.docs-sidebar__headings');
    if (existing) existing.remove();

    // Reset all chevrons, then expand the active one
    listEl.querySelectorAll('.docs-sidebar__chevron').forEach(function (c) {
      c.classList.remove('expanded');
    });

    var items = listEl.querySelectorAll('.docs-sidebar__item');
    items.forEach(function (el) {
      el.classList.toggle('active', el.dataset.file === file);
      if (el.dataset.file === file) {
        var chevron = el.querySelector('.docs-sidebar__chevron');
        if (chevron) chevron.classList.add('expanded');
      }
    });

    cardEl.classList.remove('loaded');

    fetch(file)
      .then(function (r) {
        if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
        return r.text();
      })
      .then(function (md) {
        cardEl.innerHTML = marked.parse(md);
        cardEl.classList.add('loaded');
        buildHeadingsSubmenu();
      })
      .catch(function (err) {
        cardEl.innerHTML = '<p style="color:#c00">Failed to load ' + file + ': ' + err.message + '</p>';
        cardEl.classList.add('loaded');
      });
  }

  /* ── Public API ── */
  return {
    /**
     * setSection("Section Name", ["path/to/a.md", "path/to/b.md"])
     * Call once per section, in the order you want them to appear.
     * If sectionName is null or "", files are added without a header.
     */
    setSection: function (sectionName, files) {
      sections.push({ name: sectionName || null, files: files });
    },

    /**
     * render()  — build the sidebar from all registered sections
     *             and load the doc from the URL hash (or the first file).
     */
    render: function () {
      listEl.innerHTML = '';
      var firstFile = null;

      sections.forEach(function (sec) {
        if (sec.name) {
          var hdr = document.createElement('li');
          hdr.className = 'docs-sidebar__section';
          hdr.textContent = sec.name;
          listEl.appendChild(hdr);
        }

        sec.files.forEach(function (filePath) {
          if (!firstFile) firstFile = filePath;
          var li = document.createElement('li');
          li.className = 'docs-sidebar__item';
          li.dataset.file = filePath;
          var chevron = document.createElement('span');
          chevron.className = 'docs-sidebar__chevron';
          chevron.textContent = '\u203A';
          li.appendChild(chevron);
          li.appendChild(document.createTextNode(titleFromPath(filePath)));
          li.addEventListener('click', function () { loadDoc(filePath); });
          listEl.appendChild(li);
        });
      });

      var hash = window.location.hash.slice(1);
      var allFiles = sections.reduce(function (acc, s) { return acc.concat(s.files); }, []);
      var target = allFiles.indexOf(hash) !== -1 ? hash : firstFile;
      if (target) loadDoc(target);
    },

    /** loadDoc(file) — programmatically navigate to a doc */
    loadDoc: loadDoc
  };
})();

/* handle back/forward */
window.addEventListener('hashchange', function () {
  var hash = window.location.hash.slice(1);
  if (hash) DocsLeftColumnManager.loadDoc(hash);
});

/* ─────────────────────────────────────────────────────────
   Auto-load all .md files from r/ via the server API.
   Files are grouped by their top-level subdirectory.
   ───────────────────────────────────────────────────────── */
fetch('/api/r-files')
  .then(function (r) { return r.json(); })
  .then(function (files) {
    var groups = {};
    files.forEach(function (f) {
      var parts = f.split('/');
      var section = parts.length > 1 ? parts[0] : null;
      if (!groups[section]) groups[section] = [];
      groups[section].push('/r/' + f);
    });

    Object.keys(groups).forEach(function (section) {
      DocsLeftColumnManager.setSection(section, groups[section]);
    });

    DocsLeftColumnManager.render();
  })
  .catch(function (err) {
    document.getElementById('docs-card').innerHTML =
      '<p style="color:#c00">Failed to load file list: ' + err.message + '</p>';
    document.getElementById('docs-card').classList.add('loaded');
  });
</script>

<script src="doc-exporter.js"></script>
<script>
(function () {
  var exporter = new DocExporter(document.getElementById('docs-card'));
  document.querySelectorAll('.docs-export-btn').forEach(function (btn) {
    btn.addEventListener('click', function () { exporter.export(btn.dataset.format); });
  });
})();
</script>
<script>
/* ── Sidebar resize handle ── */
(function () {
  var sidebar = document.getElementById('docs-sidebar');
  var handle = document.getElementById('docs-resize-handle');
  if (!sidebar || !handle) return;

  var dragging = false;

  handle.addEventListener('mousedown', function (e) {
    e.preventDefault();
    dragging = true;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var w = Math.max(250, Math.min(e.clientX, window.innerWidth * 0.6));
    sidebar.style.width = w + 'px';
  });

  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();
</script>
</body>
</html>
