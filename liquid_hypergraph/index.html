<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <title>Liquid Hypergraph</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/tree.css" />
  <link rel="stylesheet" href="css/facet-view.css" />
  <link rel="stylesheet" href="css/analytics.css" />
</head>
<body>
  <script src="/js/nav/sidebar.js" data-active="liquid_hypergraph" data-accent="#F59E0B"></script>

  <!-- Header -->
  <div class="lh-header">
    <h1>Liquid Hypergraph</h1>
    <p>Context Graph Protocol &mdash; URL tree, facets, and delta analytics</p>
  </div>

  <!-- Three-column layout -->
  <div class="lh-container">
    <div class="lh-panel lh-panel--tree" id="panelTree"></div>
    <div class="lh-resizer" id="resizerLeft"></div>
    <div class="lh-panel lh-panel--facets" id="panelFacets"></div>
    <div class="lh-resizer" id="resizerRight"></div>
    <div class="lh-panel lh-panel--analytics" id="panelAnalytics"></div>
  </div>

  <script type="module">
    import { connectToState }   from '/lib/state-client/StateClient.js';
    import { CgpTreeView }      from './js/tree-view.js';
    import { CgpFacetView }     from './js/facet-view.js';
    import { CgpAnalyticsView } from './js/analytics-view.js';

    // --- Minimal resolver adapter (views need _cache, urls(), resolve()) ---
    const resolver = {
      _cache: new Map(),
      urls()       { return [...this._cache.keys()]; },
      resolve(url) { return this._cache.get(url) || null; },
    };

    // --- Mount views ---
    const treeView      = new CgpTreeView(resolver, document.getElementById('panelTree'));
    const facetView     = new CgpFacetView(resolver, document.getElementById('panelFacets'));
    const analyticsView = new CgpAnalyticsView(resolver, document.getElementById('panelAnalytics'));

    // --- Wire URL selection ---
    document.addEventListener('cgp-url-selected', (e) => {
      treeView.selectUrl(e.detail.url);
      facetView.select(e.detail.url);
      analyticsView.selectUrl(e.detail.url);
    });

    // --- Canonical state pipeline via StateClient ---
    await connectToState({
      onUpdate(state, seq) {
        resolver._cache.clear();
        for (const obs of (state.observatrons || [])) {
          if (obs.url) {
            const facets = {};
            if (obs['/data'])      facets['/data']      = obs['/data'];
            if (obs['/meaning'])   facets['/meaning']   = obs['/meaning'];
            if (obs['/structure']) facets['/structure']  = obs['/structure'];
            if (obs['/context'])   facets['/context']    = obs['/context'];
            resolver._cache.set(obs.url, { url: obs.url, facets });
          }
          for (const spike of (obs.spikes || [])) {
            const spikeUrl = spike['/context']?.anchor?.[0];
            if (spikeUrl) {
              resolver._cache.set(spikeUrl, { url: spikeUrl, facets: spike });
            }
          }
        }
        treeView.render();
        analyticsView.setState(state.observatrons || []);
      },
    });

    // --- Resizer logic ---
    const panelTree      = document.getElementById('panelTree');
    const resizerLeft    = document.getElementById('resizerLeft');
    const panelFacets    = document.getElementById('panelFacets');
    const resizerRight   = document.getElementById('resizerRight');
    const panelAnalytics = document.getElementById('panelAnalytics');
    const container      = panelTree.parentElement;
    let activeResizer    = null;

    function startDrag(resizer, e) {
      e.preventDefault();
      activeResizer = resizer;
      resizer.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }

    resizerLeft.addEventListener('mousedown',  (e) => startDrag(resizerLeft, e));
    resizerRight.addEventListener('mousedown', (e) => startDrag(resizerRight, e));

    document.addEventListener('mousemove', (e) => {
      if (!activeResizer) return;
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;

      if (activeResizer === resizerLeft) {
        const w = Math.max(180, Math.min(x, rect.width - 600));
        panelTree.style.width = w + 'px';
      } else {
        const treeW = panelTree.getBoundingClientRect().width + 6;
        const available = rect.width - treeW - 6;
        let facetsW = x - treeW;
        facetsW = Math.max(300, Math.min(facetsW, available - 260));
        panelFacets.style.flex = 'none';
        panelAnalytics.style.flex = 'none';
        panelFacets.style.width = facetsW + 'px';
        panelAnalytics.style.width = (available - facetsW) + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      if (!activeResizer) return;
      activeResizer.classList.remove('active');
      activeResizer = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  </script>
</body>
</html>
